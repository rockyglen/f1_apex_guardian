name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: 🏁 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # We pull history locally but we will prune it for HF

      - name: 🚀 Push to Hub (Clean Sweep)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Kill the local .git history in the runner so the 'ghost' files vanish
          rm -rf .git
          
          # 2. Re-initialize a brand new, temporary Git repo
          git init
          git config user.name "glen-louis"
          git config user.email "glen-louis@users.noreply.github.com"
          
          # 3. Add ONLY the current files (Respects your .gitignore)
          git add .
          git commit -m "deploy: clean production build for Hugging Face"
          
          # 4. Force push this 'clean' snapshot to the Space
          # Note: Replace 'glen-louis' and the Space name if they differ
          git push --force https://glen-louis:$HF_TOKEN@huggingface.co/spaces/glen-louis/F1-2026-Apex-Guardian main