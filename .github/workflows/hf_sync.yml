name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  # Allows you to manually trigger the sync
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: 🚀 Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Replace 'your-username/your-space-name' with your actual HF info
        run: git push --force https://glen-louis:$HF_TOKEN@huggingface.co/spaces/glen-louis/F1-2026-Apex-Guardian main